# EasyCEO / TopGames Codex Proxy nginx locations
#
# Source of truth snapshot: /etc/nginx/conf.d/easyceo.conf on dev server.
# This file intentionally contains only the Codex Proxy related map/location
# blocks, not the full live EasyCEO nginx server config.
#
# Install notes:
# - Put the map block in http{} scope.
# - Put the location blocks inside the HTTPS server for easyceo.thelightco.net.
# - Keep these locations before generic API/SPA fallbacks.
# - Validate and reload with: sudo nginx -t && sudo nginx -s reload

map $http_upgrade $easyceo_codex_connection_upgrade {
    default upgrade;
    '' '';
}

    # ----------------------------------------------------------
    # Codex Proxy POC — dev-only internal device login shell
    # These routes are temporary until EasyCEO/TopGames internal auth owns them.
    # ----------------------------------------------------------
    location = /codex/device {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /codex/device/callback {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/codex/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # minicodex upstream-compatible device-code aliases.
    location ^~ /api/accounts/deviceauth/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # minicodex upstream-compatible OAuth token exchange endpoint.
    location = /oauth/token {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Dev-only dashboard session endpoints used to approve /codex/device POST.
    location ~ ^/auth/dashboard-(login|logout|status)$ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ----------------------------------------------------------
    # Codex Proxy POC — Codex Apps MCP Streamable HTTP endpoint
    # minicodex derives this from chatgpt_base_url=/backend-api/.
    # ----------------------------------------------------------
    location = /backend-api/wham/apps {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----------------------------------------------------------
    # Codex Proxy POC — Responses WebSocket endpoint
    # Preserve /openai/v1/responses for codex-proxy's WS bridge and pass Upgrade.
    # Non-WS POST also works on this preserved path via codex-proxy /openai routes.
    # ----------------------------------------------------------
    location = /openai/v1/responses {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $easyceo_codex_connection_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----------------------------------------------------------
    # Codex Proxy POC — OpenAI-compatible API path
    # /openai/v1/* is rewritten to local codex-proxy /v1/*.
    # Keep before SPA/API fallbacks. codex-proxy validates Authorization.
    # ----------------------------------------------------------
    location ^~ /openai/v1/ {
        proxy_pass http://127.0.0.1:18080/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
